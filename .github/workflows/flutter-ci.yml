name: Flutter CI - Build & Firebase App Distribution

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'firebase.json'
      - '.github/workflows/flutter-ci.yml'

jobs:
  build-and-distribute:
    name: Build APK and Distribute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Setup Java (for Android builds)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Setup Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute APK to Firebase App Distribution
        working-directory: app
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app 1:987654321098:android:nnfollowcart123456 \
            --release-notes "CI build ${{ github.sha }} | $(date -u +'%Y-%m-%d %H:%M UTC') | Push to ${{ github.ref_name }}" \
            --groups "bel talowda-testers" \
            --project nn-follow-cart \
            --token "$FIREBASE_TOKEN"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nn-follow-cart-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
