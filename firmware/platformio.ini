; nn-follow-cart ESP32 firmware
; Primary: BTS7960 skid-steer + phone GATT + ESP-NOW stereo RX
; Secondary: BLE ear + ESP-NOW TX (no motors)
; Pins: docs/pinout.md · docs/hardware/bts7960-pinout.md

[platformio]
default_envs = primary

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.3
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Primary (default board on motors / battery)
[env:primary]
build_flags =
    ${env.build_flags}
    -DNN_ROLE_PRIMARY=1
    -DNN_DEVICE_NAME=\"NN-Follow-Cart\"
build_src_filter =
    +<*>
    -<main_secondary.cpp>

; Alias so old `pio run -e esp32dev` still works
[env:esp32dev]
extends = env:primary

; Secondary ear board
[env:secondary]
build_flags =
    ${env.build_flags}
    -DNN_ROLE_SECONDARY=1
    -DNN_DEVICE_NAME=\"NN-Follow-Cart-S\"
build_src_filter =
    +<*>
    -<main.cpp>
    ; ear build skips motor/battery objects
    -<motors.cpp>
    -<battery.cpp>
