name: nn_follow_cart
description: "Naomi Nagata Follow Cart - BLE RSSI following mobile app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # BLE communication foundation
  flutter_blue_plus: ^1.32.0
  # Firebase for App Distribution and future analytics/crashlytics
  firebase_core: ^3.2.0
  # State management for live updates (distance, battery, status)
  provider: ^6.1.2
  # Permissions for BLE/location
  permission_handler: ^11.3.1
  # For distance calculation utils
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Assets placeholder for future icons/logos
  assets:
    - assets/images/